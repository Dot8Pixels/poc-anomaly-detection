# Mock Data Configuration
num_days: 10
events_per_day: 100000
output_file: "data/mock_data.parquet"

# SINGLE APP and SINGLE RIC for testing the heartbeat
app_numbers: [101]
time_settings:
  start_time: "2026-04-01T08:00:00Z"
  min_gap_seconds: 0.1
  max_gap_seconds: 0.5

# Instruments and Data
instruments:
  RICs: ["TRI.N"]
  FIDs:
    LAST: { min: 100.0, max: 1500.0, type: "float" }

# Anomalies
anomalies:
  probability: 0.01
  types:
    - name: "silence"
      duration_minutes: 10
